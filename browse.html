<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KornDog Sports — Browse & Watch</title>
<script src="https://cdn.jsdelivr.net/npm/hls.js@1/dist/hls.min.js"></script>
<style>
  :root {
    --lime: #9cff18;
    --lime-hot: #c4ff42;
    --purple: #11071d;
    --purple-2: #190b2a;
    --purple-3: #27103e;
    --text: #e9e0f4;
    --muted: #998ba9;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    min-height: 100vh;
    background: linear-gradient(180deg, #13071f 0%, #09030f 100%);
    color: var(--text);
    font-family: -apple-system, "Rajdhani", sans-serif;
    padding-bottom: 40px;
  }
  header {
    padding: 18px 16px;
    border-bottom: 1px solid rgba(156,255,24,.15);
    display: flex; align-items: center; gap: 12px;
    position: sticky; top: 0; background: rgba(13,5,24,.92); z-index: 30;
    backdrop-filter: blur(10px);
  }
  header .mark {
    width: 38px; height: 38px; border-radius: 10px;
    background: linear-gradient(135deg, var(--lime-hot), var(--lime));
    display: grid; place-items: center; font-size: 18px; flex-shrink: 0;
  }
  header h1 { font-size: 18px; font-weight: 700; }
  header .back-btn {
    margin-left: auto; background: rgba(156,255,24,.08);
    border: 1px solid rgba(156,255,24,.25); color: var(--lime);
    padding: 8px 12px; border-radius: 8px; font-size: 13px;
    cursor: pointer; display: none;
  }
  header .back-btn.show { display: block; }

  .tabs {
    display: flex; gap: 8px; overflow-x: auto; padding: 14px 16px;
    -webkit-overflow-scrolling: touch;
  }
  .tabs::-webkit-scrollbar { display: none; }
  .tab {
    flex-shrink: 0; padding: 9px 14px; border-radius: 20px;
    background: rgba(156,255,24,.06); border: 1px solid rgba(156,255,24,.2);
    color: var(--lime); font-size: 13px; font-weight: 600;
    cursor: pointer; white-space: nowrap;
  }
  .tab.active { background: var(--lime); color: var(--purple); }

  #grid {
    display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px;
    padding: 0 16px;
  }
  @media (min-width: 700px) {
    #grid { grid-template-columns: repeat(4, 1fr); }
  }
  .card {
    background: var(--purple-2); border: 1px solid rgba(200,168,255,.1);
    border-radius: 12px; overflow: hidden; cursor: pointer;
  }
  .card img {
    width: 100%; aspect-ratio: 16/10; object-fit: cover;
    background: var(--purple-3); display: block;
  }
  .card .name {
    padding: 9px 10px; font-size: 13px; font-weight: 600;
    line-height: 1.3;
  }
  .card .desc {
    padding: 0 10px 10px; font-size: 11px; color: var(--muted);
  }

  #player-view { display: none; }
  #player-view.show { display: block; }
  #video-wrap { position: relative; width: 100%; background: #000; }
  #video { width: 100%; height: auto; max-height: 100vh; display: block; object-fit: contain; }
  #video:fullscreen { max-height: 100vh; width: 100vw; object-fit: contain; }
  #player-info { padding: 14px 16px; }
  #player-info h2 { font-size: 17px; margin-bottom: 4px; }
  #player-info p { font-size: 13px; color: var(--muted); }

  .empty-msg { padding: 40px 20px; text-align: center; color: var(--muted); }
</style>
</head>
<body>

<header>
  <div class="mark">🧟</div>
  <h1>KornDog Browse</h1>
  <button class="back-btn" id="backBtn">← Back to catalogs</button>
</header>

<div id="catalog-view">
  <div class="tabs" id="tabs"></div>
  <div id="grid"></div>
</div>

<div id="player-view">
  <div id="video-wrap">
    <video id="video" controls playsinline></video>
  </div>
  <div id="player-info">
    <h2 id="player-title"></h2>
    <p id="player-desc"></p>
  </div>
</div>

<script>
  const ORIGIN = window.location.origin;
  let currentHls = null;

  const tabsEl = document.getElementById('tabs');
  const gridEl = document.getElementById('grid');
  const catalogView = document.getElementById('catalog-view');
  const playerView = document.getElementById('player-view');
  const backBtn = document.getElementById('backBtn');
  const video = document.getElementById('video');

  async function init() {
    const manifest = await fetch(`${ORIGIN}/manifest.json`).then(r => r.json());
    renderTabs(manifest.catalogs);

    const params = new URLSearchParams(window.location.search);
    const requestedCat = params.get('cat');
    const target = manifest.catalogs.find(c => c.id === requestedCat) || manifest.catalogs[0];

    if (target) {
      document.querySelectorAll('.tab').forEach(t => {
        t.classList.toggle('active', t.dataset.catId === target.id);
      });
      loadCatalog(target.id, target.name);

      // Scroll the tab strip so the active tab is actually visible, instead
      // of landing on Concert Corner while the tab bar still shows sports
      // tabs scrolled off to the left.
      const activeTabEl = document.querySelector(`.tab[data-cat-id="${target.id}"]`);
      if (activeTabEl) {
        activeTabEl.scrollIntoView({ behavior: 'instant', inline: 'center', block: 'nearest' });
      }
    }
  }

  function renderTabs(catalogs) {
    tabsEl.innerHTML = '';
    catalogs.forEach((cat, i) => {
      const btn = document.createElement('button');
      btn.className = 'tab' + (i === 0 ? ' active' : '');
      btn.dataset.catId = cat.id;
      btn.textContent = cat.name;
      btn.onclick = () => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        btn.classList.add('active');
        loadCatalog(cat.id, cat.name);
      };
      tabsEl.appendChild(btn);
    });
  }

  async function loadCatalog(id, name) {
    gridEl.innerHTML = '<div class="empty-msg">Loading...</div>';
    const data = await fetch(`${ORIGIN}/catalog/tv/${id}.json`).then(r => r.json());
    const metas = data.metas || [];

    if (metas.length === 0) {
      gridEl.innerHTML = '<div class="empty-msg">Nothing here yet.</div>';
      return;
    }

    gridEl.innerHTML = '';
    metas.forEach(meta => {
      const card = document.createElement('div');
      card.className = 'card';
      card.innerHTML = `
        <img src="${meta.poster || ''}" loading="lazy" alt="">
        <div class="name">${meta.name}</div>
        <div class="desc">${(meta.description || '').split('\n')[0]}</div>
      `;
      card.onclick = () => playItem(meta);
      gridEl.appendChild(card);
    });
  }

  async function playItem(meta) {
    const data = await fetch(`${ORIGIN}/stream/tv/${encodeURIComponent(meta.id)}.json`).then(r => r.json());
    const stream = (data.streams || [])[0];
    if (!stream) return;

    if (stream.externalUrl) {
      window.location.href = stream.externalUrl;
      return;
    }

    catalogView.style.display = 'none';
    playerView.classList.add('show');
    backBtn.classList.add('show');
    document.getElementById('player-title').textContent = meta.name;
    document.getElementById('player-desc').textContent = (meta.description || '').split('\n')[0];

    if (currentHls) { currentHls.destroy(); currentHls = null; }

    if (video.canPlayType('application/vnd.apple.mpegurl')) {
      video.src = stream.url;
      video.play().catch(() => {});
    } else if (window.Hls && Hls.isSupported()) {
      currentHls = new Hls({
        manifestLoadingTimeOut: 15000,
        manifestLoadingMaxRetry: 4,
        levelLoadingTimeOut: 15000
      });

      currentHls.on(Hls.Events.ERROR, (event, data) => {
        console.error('[hls.js error]', data.type, data.details, data.fatal);
        if (data.fatal) {
          switch (data.type) {
            case Hls.ErrorTypes.NETWORK_ERROR:
              currentHls.startLoad();
              break;
            case Hls.ErrorTypes.MEDIA_ERROR:
              currentHls.recoverMediaError();
              break;
            default:
              document.getElementById('player-desc').textContent =
                'Stream failed to load. Try again or pick another channel.';
              break;
          }
        }
      });

      currentHls.on(Hls.Events.MANIFEST_PARSED, () => {
        video.play().catch(() => {});
      });

      currentHls.loadSource(stream.url);
      currentHls.attachMedia(video);
    }

    if (video.requestFullscreen) {
      video.requestFullscreen().catch(() => {});
    } else if (video.webkitEnterFullscreen) {
      video.webkitEnterFullscreen();
    }
  }

  backBtn.onclick = () => {
    if (currentHls) { currentHls.destroy(); currentHls = null; }
    video.pause();
    video.removeAttribute('src');
    playerView.classList.remove('show');
    catalogView.style.display = 'block';
    backBtn.classList.remove('show');
  };

  init();
</script>

</body>
</html>
