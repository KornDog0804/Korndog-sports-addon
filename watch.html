<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KornDog Concert Corner</title>
<style>
  html, body { margin: 0; padding: 0; background: #0a0512; height: 100%; overflow: hidden; }
  #player-wrap { position: fixed; inset: 0; }
  #player { width: 100%; height: 100%; }
  #now-playing {
    position: fixed; bottom: 14px; left: 14px; z-index: 10;
    color: #c4ff42; font-family: -apple-system, sans-serif; font-size: 14px;
    background: rgba(10,5,18,.7); padding: 6px 12px; border-radius: 8px;
    pointer-events: none;
  }
</style>
</head>
<body>

<div id="player-wrap"><div id="player"></div></div>
<div id="now-playing"></div>

<script src="https://www.youtube.com/iframe_api"></script>
<script>
  // Reads ?ids=VIDEOID1,VIDEOID2,...&titles=Title%20One,Title%20Two,...
  // from the URL, queues them, and auto-advances through the whole set -
  // this is what recreates a "stitched" multi-song session using YouTube's
  // own official embed player. No extraction, no downloading - just
  // sequential playback of the same public embeds YouTube itself provides.
  const params = new URLSearchParams(window.location.search);
  const ids = (params.get('ids') || '').split(',').filter(Boolean);
  const titles = (params.get('titles') || '').split(',').map(t => decodeURIComponent(t));
  const sessionName = decodeURIComponent(params.get('session') || 'KornDog Concert Corner');

  let currentIndex = 0;
  let player;

  function updateNowPlaying() {
    const title = titles[currentIndex] || `Track ${currentIndex + 1}`;
    document.getElementById('now-playing').textContent =
      `${sessionName} — ${title} (${currentIndex + 1}/${ids.length})`;
  }

  function onYouTubeIframeAPIReady() {
    if (ids.length === 0) {
      document.getElementById('now-playing').textContent = 'No videos specified.';
      return;
    }

    player = new YT.Player('player', {
      height: '100%',
      width: '100%',
      videoId: ids[0],
      playerVars: { autoplay: 1, playsinline: 1, rel: 0 },
      events: {
        onStateChange: onPlayerStateChange
      }
    });
    updateNowPlaying();
  }

  function onPlayerStateChange(event) {
    if (event.data === YT.PlayerState.ENDED) {
      currentIndex++;
      if (currentIndex < ids.length) {
        player.loadVideoById(ids[currentIndex]);
        updateNowPlaying();
      }
    }
  }
</script>

</body>
</html>
