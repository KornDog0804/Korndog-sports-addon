<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KornDog Concert Corner</title>
<style>
  html, body { margin: 0; padding: 0; background: #0a0512; height: 100%; overflow: hidden; }
  #player-wrap { position: fixed; inset: 0; }
  #player { width: 100%; height: 100%; }
  #now-playing {
    position: fixed; bottom: 14px; left: 14px; z-index: 10;
    color: #c4ff42; font-family: -apple-system, sans-serif; font-size: 14px;
    background: rgba(10,5,18,.7); padding: 6px 12px; border-radius: 8px;
    pointer-events: none;
  }
  #unmute-btn {
    position: fixed; top: 14px; right: 14px; z-index: 20;
    background: #9cff18; color: #0a0512; border: none; border-radius: 10px;
    font-family: -apple-system, sans-serif; font-weight: 700; font-size: 18px;
    padding: 14px 22px; cursor: pointer;
  }
  #unmute-btn:focus {
    outline: 4px solid #fff; outline-offset: 2px;
  }
  #unmute-btn.hidden { display: none; }
</style>
</head>
<body>

<div id="player-wrap"><div id="player"></div></div>
<div id="now-playing"></div>
<button id="unmute-btn">▶ Tap to Start with Sound</button>

<script src="https://www.youtube.com/iframe_api"></script>
<script>
  // Reads ?ids=VIDEOID1,VIDEOID2,...&titles=Title%20One,Title%20Two,...
  // from the URL, queues them, and auto-advances through the whole set.
  //
  // TV-remote fix: browsers block autoplay-with-sound unless the user has
  // already interacted with the page, and a TV remote's D-pad can't click
  // into YouTube's own play-button overlay (it lives inside a cross-origin
  // iframe). So we start muted (which autoplay IS allowed to do), and show
  // our own real on-page button - outside the iframe, fully focusable by a
  // TV remote - that unmutes and confirms playback with one press.
  const params = new URLSearchParams(window.location.search);
  const ids = (params.get('ids') || '').split(',').filter(Boolean);
  const titles = (params.get('titles') || '').split(',').map(t => decodeURIComponent(t));
  const sessionName = decodeURIComponent(params.get('session') || 'KornDog Concert Corner');

  let currentIndex = 0;
  let player;

  function updateNowPlaying() {
    const title = titles[currentIndex] || `Track ${currentIndex + 1}`;
    document.getElementById('now-playing').textContent =
      `${sessionName} — ${title} (${currentIndex + 1}/${ids.length})`;
  }

  function onYouTubeIframeAPIReady() {
    if (ids.length === 0) {
      document.getElementById('now-playing').textContent = 'No videos specified.';
      return;
    }

    player = new YT.Player('player', {
      height: '100%',
      width: '100%',
      videoId: ids[0],
      playerVars: { autoplay: 1, mute: 1, playsinline: 1, rel: 0, controls: 1 },
      events: {
        onReady: onPlayerReady,
        onStateChange: onPlayerStateChange
      }
    });
    updateNowPlaying();
  }

  function onPlayerReady() {
    const btn = document.getElementById('unmute-btn');
    btn.focus(); // so a TV remote lands on it immediately, no navigation needed
    btn.addEventListener('click', () => {
      player.unMute();
      player.playVideo();
      btn.classList.add('hidden');
    });
  }

  function onPlayerStateChange(event) {
    if (event.data === YT.PlayerState.ENDED) {
      currentIndex++;
      if (currentIndex < ids.length) {
        player.loadVideoById(ids[currentIndex]);
        updateNowPlaying();
      }
    }
  }
</script>

</body>
</html>
